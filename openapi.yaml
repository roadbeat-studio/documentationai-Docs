  /api/v1/assets/search:
    get:
      operationId: AssetsController_search
      summary: Advanced asset search with text, filters, sorting, and pagination
      parameters:
        - name: page
          required: false
          in: query
          description: Page number (1-indexed)
          schema:
            minimum: 1
            default: 1
            type: number
        - name: limit
          required: false
          in: query
          description: Items per page
          schema:
            minimum: 1
            maximum: 100
            default: 20
            type: number
        - name: sortBy
          required: false
          in: query
          description: Field to sort by
          schema:
            default: createdAt
            type: string
        - name: sortOrder
          required: false
          in: query
          description: Sort direction
          schema:
            default: desc
            enum:
              - asc
              - desc
            type: string
        - name: q
          required: false
          in: query
          description: Search query (filename, title, description, tags)
          schema:
            type: string
        - name: folderId
          required: false
          in: query
          description: Filter by folder ID ("root" for unfiled assets)
          schema:
            type: string
        - name: mimeType
          required: false
          in: query
          description: Filter by MIME type prefix (e.g., "image/", "video/", "image/png")
          schema:
            type: string
        - name: tags
          required: false
          in: query
          description: Filter by tags (comma-separated, matches any)
          schema:
            type: string
        - name: uploadedById
          required: false
          in: query
          description: Filter by uploader user ID
          schema:
            type: string
        - name: createdAfter
          required: false
          in: query
          description: Filter by created after date (ISO 8601)
          schema:
            type: string
        - name: createdBefore
          required: false
          in: query
          description: Filter by created before date (ISO 8601)
          schema:
            type: string
        - name: minSize
          required: false
          in: query
          description: Minimum file size in bytes
          schema:
            type: number
        - name: maxSize
          required: false
          in: query
          description: Maximum file size in bytes
          schema:
            type: number
        - name: minWidth
          required: false
          in: query
          description: Minimum image width in pixels
          schema:
            type: number
        - name: minHeight
          required: false
          in: query
          description: Minimum image height in pixels
          schema:
            type: number
        - name: sort
          required: false
          in: query
          description: 'Sort order: name, -name, date, -date, size, -size'
          schema:
            default: '-date'
            type: string
      responses:
        '200':
          description: ''
      tags:
        - assets
      security:
        - bearer: []
