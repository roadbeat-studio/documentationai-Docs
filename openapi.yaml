openapi: 3.0.0
paths:
  /api/v1/plugins/manifest:
    get:
      operationId: PluginsController_getManifest
      summary: Get plugin manifest
      description: >-
        Returns active plugins, licensed features, and resource limits. Called
        by the admin UI at startup to determine which Pro features to show.
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - plugins
  /api/v1/plugins/license:
    get:
      operationId: PluginsController_getLicenseInfo
      summary: Get license info
      description: Returns current license status for admin dashboard display.
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - plugins
  /api/v1/plugins/{pluginId}/ui/{filename}:
    get:
      operationId: PluginAssetsController_getPluginAsset
      summary: Get plugin frontend asset
      description: >-
        Serves compiled frontend bundles (JS/CSS) from plugin directories. Used
        by the admin UI to dynamically load Pro plugin interfaces.
      parameters:
        - name: pluginId
          required: true
          in: path
          schema:
            type: string
        - name: filename
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
      tags:
        - plugins
  /api/v1/auth/login:
    post:
      operationId: AuthController_login
      summary: Login with email and password
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginDto'
      responses:
        '200':
          description: ''
      tags:
        - auth
  /api/v1/auth/refresh:
    post:
      operationId: AuthController_refresh
      summary: Refresh access token
      description: Exchange a valid refresh token for new access + refresh tokens.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenDto'
      responses:
        '200':
          description: ''
      tags:
        - auth
  /api/v1/auth/setup:
    post:
      operationId: AuthController_setup
      summary: Initial admin setup
      description: >-
        Creates the first organization and admin user. Only works when no
        organizations exist.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupDto'
      responses:
        '201':
          description: ''
      tags:
        - auth
  /api/v1/auth/setup/status:
    get:
      operationId: AuthController_setupStatus
      summary: Check if initial setup is needed
      description: Returns whether the instance needs initial admin setup.
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - auth
  /api/v1/auth/me:
    get:
      operationId: AuthController_getProfile
      summary: Get current user profile
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - auth
      security:
        - bearer: []
    patch:
      operationId: AuthController_updateProfile
      summary: Update own profile (name, avatar)
      parameters: []
      responses:
        '200':
          description: ''
      tags:
        - auth
      security:
        - bearer: []
  /api/v1/auth/change-password:
    post:
      operationId: AuthController_changePassword
      summary: Change password (requires current password)
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordDto'
      responses:
        '200':
          description: ''
      tags:
        - auth
      security:
        - bearer: []
  /api/v1/auth/password/forgot:
    post:
      operationId: AuthController_forgotPassword
      summary: Request password reset
      description: >-
        Sends a password reset token (logged in dev mode). Always returns
        success to prevent email enumeration.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordDto'
      responses:
        '200':
          description: ''
      tags:
        - auth
  /api/v1/auth/password/reset:
    post:
      operationId: AuthController_resetPassword
      summary: Reset password with token
      description: >-
        Validates the reset token and sets a new password. Token is single-use
        and expires after 1 hour.
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordDto'
      responses:
        '200':
          description: ''
      tags:
        - auth
