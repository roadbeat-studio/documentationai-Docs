info:
  title: roadbeat Studio API
  description: Self-hosted headless CMS — Content Management & Publishing API
  version: 0.1.0
  contact: {}
tags:
  - name: auth
    description: Authentication & authorization
  - name: users
    description: User management
  - name: organizations
    description: Organization management
  - name: content-types
    description: Content type definitions & schema sync
  - name: content
    description: Content CRUD & versioning
  - name: assets
    description: Asset upload & management
  - name: webhooks
    description: Webhook configuration
  - name: plugins
    description: Plugin system & feature gates
  - name: health
    description: Health checks
servers:
  - url: https://studio.roadbeat.net
    description: Production
  - url: http://localhost:3000
    description: Local Development
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    LoginDto:
      type: object
      properties:
        email:
          type: string
          example: admin@example.com
          description: User email address
        password:
          type: string
          example: securePass123!
          minLength: 8
      required:
        - email
        - password
    RefreshTokenDto:
      type: object
      properties:
        refreshToken:
          type: string
          description: Refresh token obtained from login
      required:
        - refreshToken
    SetupDto:
      type: object
      properties:
        email:
          type: string
          example: admin@example.com
          description: Admin email address
        password:
          type: string
          example: securePass123!
          minLength: 8
        name:
          type: string
          example: John Doe
          description: Admin display name
        organizationName:
          type: string
          example: My News Organization
          description: Organization name (defaults to "Default Organization")
        organizationSlug:
          type: string
          example: my-news-org
          description: Organization slug (auto-generated from name if omitted)
      required:
        - email
        - password
        - name
    ChangePasswordDto:
      type: object
      properties:
        currentPassword:
          type: string
          description: Current password
        newPassword:
          type: string
          description: New password
          minLength: 8
      required:
        - currentPassword
        - newPassword
    ForgotPasswordDto:
      type: object
      properties:
        email:
          type: string
          example: user@example.com
          description: Email address of the account
      required:
        - email
    ResetPasswordDto:
      type: object
      properties:
        token:
          type: string
          description: Password reset token from email
        newPassword:
          type: string
          description: New password
          minLength: 8
      required:
        - token
        - newPassword
    CreatePermissionRuleDto:
      type: object
      properties: {}
    UpdatePermissionRuleDto:
      type: object
      properties: {}
    SetContentTypePermissionsDto:
      type: object
      properties: {}
    CheckPermissionDto:
      type: object
      properties: {}
    CreateCustomRoleDto:
      type: object
      properties: {}
    UpdateCustomRoleDto:
      type: object
      properties: {}
    DuplicateRoleDto:
      type: object
      properties: {}
    ExecuteRequestDto:
      type: object
      properties: {}
    SaveHistoryDto:
      type: object
      properties: {}
    CreateAuditEntryDto:
      type: object
      properties: {}
    CreateRetentionPolicyDto:
      type: object
      properties: {}
    UpdateRetentionPolicyDto:
      type: object
      properties: {}
    CreateSavedSearchDto:
      type: object
      properties: {}
    UpdateSavedSearchDto:
      type: object
      properties: {}
    GenerateComplianceReportDto:
      type: object
      properties: {}
    BulkMoveDto:
      type: object
      properties: {}
    BulkDeleteDto:
      type: object
      properties: {}
    BulkAddTagsDto:
      type: object
      properties: {}
    BulkRemoveTagsDto:
      type: object
      properties: {}
    BulkDownloadDto:
      type: object
      properties: {}
    CreateEnvironmentDto:
      type: object
      properties: {}
    UpdateEnvironmentDto:
      type: object
      properties: {}
    PromoteContentDto:
      type: object
      properties: {}
    SyncEnvironmentsDto:
      type: object
      properties: {}
    CompareEnvironmentsDto:
      type: object
      properties: {}
    CreateAliasDto:
      type: object
      properties: {}
    UpdateAliasDto:
      type: object
      properties: {}
    CloneEnvironmentDto:
      type: object
      properties: {}
    CreateExportJobDto:
      type: object
      properties: {}
    CreateExportTemplateDto:
      type: object
      properties: {}
    UpdateExportTemplateDto:
      type: object
      properties: {}
    UpdateGraphQLConfigDto:
      type: object
      properties: {}
    CreateImportJobDto:
      type: object
      properties: {}
    RetryImportDto:
      type: object
      properties: {}
    PreviewImportDto:
      type: object
      properties: {}
    CreateCustomLayoutDto:
      type: object
      properties:
        contentTypeId:
          type: string
          description: Content type ID this layout is for
        layoutId:
          type: string
          description: Unique layout identifier
        name:
          type: object
          description: Layout display name (i18n JSON)
        description:
          type: object
          description: Layout description (i18n JSON)
        version:
          type: string
          description: Semver version string
        definition:
          type: object
          description: Full layout definition JSON
        tags:
          description: Tags for categorization
          type: array
          items:
            type: string
        previewImage:
          type: string
          description: Preview image URL
        license:
          type: string
          description: License identifier
        isDefault:
          type: boolean
          description: Set as default layout
          default: false
      required:
        - contentTypeId
        - layoutId
        - name
        - version
        - definition
    UpdateCustomLayoutDto:
      type: object
      properties:
        name:
          type: object
          description: Layout display name (i18n JSON)
        description:
          type: object
          description: Layout description (i18n JSON)
        draftDefinition:
          type: object
          description: Draft layout definition JSON (not yet published)
        tags:
          description: Tags for categorization
          type: array
          items:
            type: string
        previewImage:
          type: string
          description: Preview image URL
    ImportLayoutDto:
      type: object
      properties:
        definition:
          type: object
          description: Layout definition JSON to import
        layoutId:
          type: string
          description: Override layout ID (defaults to definition.layout_id)
      required:
        - definition
    ConfigureGitDto:
      type: object
      properties:
        repoUrl:
          type: string
          description: Git repository URL
        branch:
          type: string
          description: 'Git branch (default: main)'
        path:
          type: string
          description: Path within the repo for layout files
      required:
        - repoUrl
    AcquireLockDto:
      type: object
      properties:
        lockType:
          type: string
          description: 'Lock type: advisory (warns others) or exclusive (blocks others)'
          enum:
            - advisory
            - exclusive
          default: exclusive
    CreateVideoJobDto:
      type: object
      properties: {}
    CreateTranscodeProfileDto:
      type: object
      properties: {}
    UpdateTranscodeProfileDto:
      type: object
      properties: {}
    CreateNotificationDto:
      type: object
      properties: {}
    UpdatePreferencesDto:
      type: object
      properties: {}
    CreateChannelDto:
      type: object
      properties: {}
    UpdateChannelDto:
      type: object
      properties: {}
    TestChannelDto:
      type: object
      properties: {}
    GeneratePreviewTokenDto:
      type: object
      properties: {}
    CreateShareableLinkDto:
      type: object
      properties: {}
    SchedulePublishDto:
      type: object
      properties:
        scheduledAt:
          type: string
          example: '2026-03-20T18:00:00Z'
          description: ISO 8601 datetime for scheduled publish
        timezone:
          type: string
          example: Europe/Berlin
          description: IANA timezone for display purposes
      required:
        - scheduledAt
    ScheduleUnpublishDto:
      type: object
      properties:
        scheduledAt:
          type: string
          example: '2026-04-01T00:00:00Z'
          description: ISO 8601 datetime for scheduled unpublish
        timezone:
          type: string
          example: UTC
      required:
        - scheduledAt
    ScheduleArchiveDto:
      type: object
      properties:
        scheduledAt:
          type: string
          example: '2026-06-01T00:00:00Z'
        timezone:
          type: string
          example: UTC
      required:
        - scheduledAt
    BulkScheduleDto:
      type: object
      properties:
        contentIds:
          description: Content UUIDs to schedule
          type: array
          items:
            type: string
        action:
          type: string
          enum:
            - publish
            - unpublish
          example: publish
        scheduledAt:
          type: string
          example: '2026-03-20T18:00:00Z'
        timezone:
          type: string
          example: Europe/Berlin
      required:
        - contentIds
        - action
        - scheduledAt
    ReleaseItemDto:
      type: object
      properties:
        contentId:
          type: string
          description: Content UUID
        action:
          type: string
          enum:
            - publish
            - unpublish
            - archive
          example: publish
        sortOrder:
          type: number
          example: 0
          description: Execution order (ascending)
      required:
        - contentId
        - action
    CreateReleaseDto:
      type: object
      properties:
        name:
          type: string
          example: March Product Launch
        description:
          type: string
          example: All content for the March 2026 product launch
        items:
          description: Content items in this release
          type: array
          items:
            $ref: '#/components/schemas/ReleaseItemDto'
      required:
        - name
        - items
    UpdateReleaseDto:
      type: object
      properties:
        name:
          type: string
          example: March Product Launch v2
        description:
          type: string
    AddReleaseItemsDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReleaseItemDto'
      required:
        - items
    RemoveReleaseItemsDto:
      type: object
      properties:
        itemIds:
          description: Release item UUIDs to remove
          type: array
          items:
            type: string
      required:
        - itemIds
    ScheduleReleaseDto:
      type: object
      properties:
        scheduledAt:
          type: string
          example: '2026-03-20T18:00:00Z'
      required:
        - scheduledAt
    CreateSSOConfigDto:
      type: object
      properties: {}
    UpdateSSOConfigDto:
      type: object
      properties: {}
    SAMLCallbackDto:
      type: object
      properties: {}
    CheckLoginMethodDto:
      type: object
      properties: {}
    CreateRoleMappingDto:
      type: object
      properties: {}
    UpdateRoleMappingDto:
      type: object
      properties: {}
    UpdateRetryConfigDto:
      type: object
      properties: {}
    CreateIncomingWebhookDto:
      type: object
      properties: {}
    UpdateIncomingWebhookDto:
      type: object
      properties: {}
    CreateThemeDto:
      type: object
      properties: {}
    UpdateThemeDto:
      type: object
      properties: {}
    UpdateBrandingDto:
      type: object
      properties: {}
    AccessibilitySettingsDto:
      type: object
      properties: {}
    WorkflowStateDto:
      type: object
      properties:
        id:
          type: string
          example: draft
        name:
          type: object
          example:
            en: Draft
            de: Entwurf
        color:
          type: string
          example: '#6B7280'
        isInitial:
          type: boolean
          example: true
        isFinal:
          type: boolean
          example: false
        requiredRoles:
          example:
            - admin
            - editor
          type: array
          items:
            type: string
      required:
        - id
        - name
    WorkflowTransitionDto:
      type: object
      properties:
        from:
          type: string
          example: draft
        to:
          type: string
          example: in_review
        action:
          type: string
          example: submit_for_review
        label:
          type: object
          example:
            en: Submit for Review
            de: Zur Prüfung einreichen
        requiredRoles:
          example:
            - editor
            - admin
          type: array
          items:
            type: string
        requiresComment:
          type: boolean
          example: false
      required:
        - from
        - to
        - action
        - label
    CreateWorkflowDefinitionDto:
      type: object
      properties:
        name:
          type: object
          example:
            en: Editorial Review
            de: Redaktionsprüfung
        description:
          type: object
          example:
            en: Standard editorial workflow
        contentTypeIds:
          example:
            - news
            - blog-post
          type: array
          items:
            type: string
        states:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStateDto'
        transitions:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowTransitionDto'
        isDefault:
          type: boolean
          example: true
      required:
        - name
        - contentTypeIds
        - states
        - transitions
    UpdateWorkflowDefinitionDto:
      type: object
      properties:
        name:
          type: object
          example:
            en: Editorial Review v2
        description:
          type: object
        contentTypeIds:
          example:
            - news
          type: array
          items:
            type: string
        states:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowStateDto'
        transitions:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowTransitionDto'
        isDefault:
          type: boolean
        isActive:
          type: boolean
    InitializeInstanceDto:
      type: object
      properties:
        workflowId:
          type: string
          description: Workflow definition ID to use
      required:
        - workflowId
    TransitionInstanceDto:
      type: object
      properties:
        targetState:
          type: string
          example: in_review
        comment:
          type: string
          example: Looks good, moving to review.
      required:
        - targetState
    AssignTaskDto:
      type: object
      properties:
        assigneeId:
          type: string
          description: User ID to assign the task to
      required:
        - assigneeId
    CreateUserDto:
      type: object
      properties:
        email:
          type: string
          example: jane@example.com
          description: Unique email address
        password:
          type: string
          example: securePass123!
          minLength: 8
          maxLength: 128
        name:
          type: string
          example: Jane Doe
          minLength: 2
          maxLength: 100
        role:
          type: string
          example: editor
          enum:
            - admin
            - editor
            - viewer
          description: 'CE supports 3 fixed roles: admin, editor, viewer'
      required:
        - email
        - password
        - name
        - role
    UpdateUserDto:
      type: object
      properties:
        name:
          type: string
          example: Jane Smith
          minLength: 2
          maxLength: 100
        role:
          type: string
          example: editor
          enum:
            - admin
            - editor
            - viewer
          description: 'CE supports 3 fixed roles: admin, editor, viewer'
        status:
          type: string
          example: active
          enum:
            - active
            - inactive
            - suspended
    UpdateOrganizationDto:
      type: object
      properties:
        name:
          type: string
          example: My News Organization
          minLength: 2
          maxLength: 200
        settings:
          type: object
          example:
            defaultLocale: de
            timezone: Europe/Berlin
          description: Organization-level settings JSON
    UpsertContentTypeDto:
      type: object
      properties:
        name:
          type: object
          example:
            en: News
            de: Nachrichten
          description: Localized display name
        description:
          type: object
          example:
            en: News articles and press releases
            de: Nachrichtenartikel und Pressemitteilungen
          description: Localized description
        schemaVersion:
          type: string
          example: 1.0.0
          description: Schema version (semver)
        schema:
          type: object
          example:
            type: object
            properties:
              headline:
                type: object
          description: JSON Schema for content validation
        formSchema:
          type: object
          description: UI form layout schema for the content editor
        teaserSchema:
          type: object
          description: Teaser field mapping schema for Discovery Node publishing
        icon:
          type: string
          example: newspaper
          description: Lucide icon name
        settings:
          type: object
          description: Content type settings JSON
      required:
        - name
        - schemaVersion
        - schema
    CreateContentDto:
      type: object
      properties:
        contentTypeId:
          type: string
          example: news
          description: Content type ID (must match a registered content type)
        slug:
          type: string
          example: chancellor-announces-climate-policy
          description: URL slug. Auto-generated from title if omitted.
        data:
          type: object
          example:
            headline:
              en: Breaking News
            body:
              en: <p>Article content</p>
          description: Content data object, validated against the content type schema
        locale:
          type: string
          example: en
          description: 'Content locale (CE: single locale only)'
          default: en
      required:
        - contentTypeId
        - data
    BulkActionDto:
      type: object
      properties:
        ids:
          description: Array of content UUIDs
          type: array
          items:
            type: string
      required:
        - ids
    ReorderItemDto:
      type: object
      properties:
        id:
          type: string
          description: Item UUID
        sortOrder:
          type: number
          description: New sort order (0-based)
      required:
        - id
